# Railway: comandi letti dal repo (non serve impostarli a mano nel dashboard)
# Al deploy: build → poi start che esegue le migrazioni e avvia Next.js

[build]
builder = "DOCKERFILE"
dockerfilePath = "/Dockerfile"

[deploy]
startCommand = "npm run start:prod"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
